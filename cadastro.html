<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro — Auto+Assis</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --accent:#ff6a00;
      --white:#ffffff;
      --muted:#cccccc;
      --success:#22c55e;
      --danger:#ff4d4d;
      --radius:14px;
      --shadow:0 8px 30px rgba(0,0,0,0.6);
      font-family:Inter,system-ui,sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--white);display:flex;align-items:center;justify-content:center;padding:32px;}
    .card{width:100%;max-width:920px;display:grid;grid-template-columns:1fr 420px;gap:28px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .panel{padding:36px;background:linear-gradient(135deg,rgba(255,106,0,0.07)0%,transparent50%),radial-gradient(800px400pxat10%10%,rgba(255,106,0,0.06),transparent20%);display:flex;flex-direction:column;justify-content:center;gap:18px;}
    .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
    .logo .mark{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;font-size:18px;box-shadow:0 10px30pxrgba(255,106,0,0.12)inset;}
    .logo h1{margin:0;font-size:20px;color:var(--white)}
    .logo p{margin:0;color:var(--muted);font-size:13px}
    .promo{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.4;}
    .form-wrap{padding:36px40px;background:linear-gradient(180deg,rgba(10,10,10,0.8),rgba(15,15,15,0.9));display:flex;flex-direction:column;justify-content:center;gap:18px;}
    h2{margin:0 06px0;font-size:20px}
    p.lead{margin:0;color:var(--muted);font-size:13px}
    form{display:flex;flex-direction:column;gap:12px;margin-top:8px}
    label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
    input[type=text],input[type=email],input[type=password]{width:100%;padding:12px14px;border-radius:10px;border:1pxsolidrgba(255,255,255,0.06);background:transparent;color:var(--white);font-size:15px;outline:none;transition:box-shadow.18s,border-color.18s;}
    input:focus{border-color:rgba(255,106,0,0.9);box-shadow:0 6px18pxrgba(255,106,0,0.08);}
    .pwd-field{position:relative}
    .toggle-pwd{position:absolute;right:10px;top:8px;background:none;border:none;color:var(--muted);padding:8px;border-radius:8px;cursor:pointer}
    button[type=submit]{margin-top:8px;padding:12px14px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent),#ff8a3d);color:var(--white);font-weight:600;cursor:pointer;font-size:15px;box-shadow:0 8px18pxrgba(255,106,0,0.14);}
    button[type=submit]:active{transform:translateY(1px)}
    .links{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:6px}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .status{font-size:13px;padding:10px;border-radius:10px}
    .error{background:rgba(255,77,77,0.08);color:var(--danger);border:1pxsolidrgba(255,77,77,0.1)}
    .ok{background:rgba(34,197,94,0.07);color:var(--success);border:1pxsolidrgba(34,197,94,0.08)}
    footer{padding:14px18px;text-align:center;color:var(--muted);font-size:13px}
    @media(max-width:880px){.card{grid-template-columns:1fr;}.panel{order:2;padding:22px}.form-wrap{order:1;padding:28px}}
  </style>
</head>
<body>
  <main class="card">
    <section class="panel">
      <div class="logo">
        <span class="mark">A+</span>
        <div>
          <h1>Auto+Assis</h1>
          <p>Oficina & Serviços</p>
        </div>
      </div>
      <p class="promo">Cadastre-se para acessar o sistema da Auto+Assis e acompanhar seus serviços e orçamentos.</p>
    </section>

    <section class="form-wrap">
      <div>
        <h2>Criar conta</h2>
        <p class="lead">Preencha os dados abaixo para se cadastrar.</p>
      </div>

      <form id="signupForm" novalidate>
        <div>
          <label for="name">Nome completo</label>
          <input id="name" name="name" type="text" placeholder="Seu nome" required>
        </div>
        <div>
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>
        </div>
        <div>
          <label for="password">Senha</label>
          <div class="pwd-field">
            <input id="password" name="password" type="password" placeholder="••••••••" minlength="6" required>
            <button type="button" class="toggle-pwd" aria-label="Mostrar senha">👁️</button>
          </div>
        </div>
        <div>
          <label for="confirm">Confirmar senha</label>
          <input id="confirm" name="confirm" type="password" placeholder="••••••••" minlength="6" required>
        </div>

        <div id="status" class="status" style="display:none"></div>

        <button type="submit" id="submitBtn">Cadastrar</button>

        <div class="links">
          <span>Já tem conta? <a href="login.html">Entrar</a></span>
          <span><a href="recuperar.html">Esqueceu a senha?</a></span>
        </div>
      </form>

      <footer>&copy; <span id="year"></span> Auto+Assis — Todos os direitos reservados</footer>
    </section>
  </main>

  <script>
    // --- Funções de Simulação de Usuários Cadastrados ---
    function getUsuariosCadastrados() {
        const users = localStorage.getItem('usuariosCadastrados');
        // Inicializa com um usuário Admin/Gerente para testes, se estiver vazio
        const defaultUsers = {
            'admin@autoassis.com': { name: 'Pedro', password: 'admin123', isGerente: true }
        };
        return users ? JSON.parse(users) : defaultUsers; 
    }

    function setUsuariosCadastrados(users) {
        localStorage.setItem('usuariosCadastrados', JSON.stringify(users));
    }
    // --- Fim das Funções de Simulação ---

    const form=document.getElementById('signupForm');
    const nameEl=document.getElementById('name');
    const emailEl=document.getElementById('email');
    const pwdEl=document.getElementById('password');
    const confirmEl=document.getElementById('confirm');
    const statusEl=document.getElementById('status');
    const toggleBtn=document.querySelector('.toggle-pwd');
    const submitBtn=document.getElementById('submitBtn');
    document.getElementById('year').textContent=new Date().getFullYear();

    toggleBtn.addEventListener('click',()=>{
      const show=pwdEl.type==='text';
      pwdEl.type=show?'password':'text';
      confirmEl.type=show?'password':'text';
      toggleBtn.textContent=show?'👁️':'🙈';
    });

    function showStatus(msg,type){
      statusEl.style.display='block';
      statusEl.textContent=msg;
      statusEl.className='status '+(type==='error'?'error':'ok');
    }
    function clearStatus(){
      statusEl.style.display='none';
      statusEl.textContent='';
      statusEl.className='status';
    }

    form.addEventListener('submit',(e)=>{
      e.preventDefault();
      clearStatus();
      const name=nameEl.value.trim();
      const email=emailEl.value.trim();
      const pwd=pwdEl.value;
      const confirm=confirmEl.value;

      // Validações
      if(!name){showStatus('Informe seu nome completo.','error');return;}
      if(!email){showStatus('Informe um e-mail.','error');return;}
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showStatus('E-mail inválido.','error');return;}
      if(pwd.length<6){showStatus('A senha deve ter pelo menos 6 caracteres.','error');return;}
      if(pwd!==confirm){showStatus('As senhas não conferem.','error');return;}

      // Lógica de Cadastro Realista (Simulado)
      const usuarios = getUsuariosCadastrados();

      if (usuarios.hasOwnProperty(email)) {
          showStatus('Este e-mail já está cadastrado. Tente entrar na conta.','error');
          return;
      }
      
      // Salva o novo usuário com a senha escolhida
      usuarios[email] = {
          name: name,
          password: pwd,
          isGerente: false // Todos os cadastros são de clientes
      };

      setUsuariosCadastrados(usuarios);
      
      submitBtn.disabled=true;submitBtn.textContent='Cadastrando...';
      
      setTimeout(()=>{
        showStatus('Cadastro realizado com sucesso! Redirecionando para login...','ok');
        setTimeout(()=>{window.location.href='login.html';},1000);
      },900);
    });

    [nameEl,emailEl,pwdEl,confirmEl].forEach(el=>el.addEventListener('input',()=>{if(statusEl.style.display==='block')clearStatus();}));
  </script>
</body>
</html>
