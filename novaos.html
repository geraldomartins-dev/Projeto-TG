<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova OS — Auto+Assis</title>
  <style>
    :root {
      --bg:#0a0a0a;
      --panel:#0f0f0f;
      --accent:#ff6a00;
      --white:#ffffff;
      --muted:#cccccc;
      --success:#22c55e;
      --danger:#ff4d4d;
      --radius:12px;
      --shadow:0 8px 30px rgba(0,0,0,0.6);
      font-family: Inter, system-ui, sans-serif;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--white);}

    .container{display:flex;height:100vh;}
    aside{width:260px;background:var(--panel);padding:24px;display:flex;flex-direction:column;gap:18px; border-right: 1px solid #1a1a1a;}
    aside .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
    aside .logo .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;}
    aside nav{flex:1;display:flex;flex-direction:column;gap:12px;}
    aside nav a{padding:10px 14px;border-radius:10px;color:var(--white);text-decoration:none;display:block;}
    aside nav a.active, aside nav a:hover{background:rgba(255,106,0,0.25); color: var(--accent);}
    aside .user{margin-top:auto;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05);text-align:center;}
    aside button{margin-top:12px;padding:10px;border:none;border-radius:10px;background:rgba(255,77,77,0.2);color:var(--danger);cursor:pointer; width: 100%;}
    aside button:hover{background:rgba(255,77,77,0.35);}

    main{flex:1;padding:30px;overflow-y:auto;}
    main h1{font-size:24px;margin-bottom:6px; color: var(--white);}
    main p{color:var(--muted);margin-bottom:18px;}

    .form-box{background:var(--panel);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:20px;margin-top:12px; border: 1px solid #1a1a1a;}
    .row{display:flex;gap:18px;flex-wrap:wrap;}
    .field{flex:1;display:flex;flex-direction:column;gap:6px;min-width:200px;}
    .field label{font-size:14px;color:var(--white);}
    .field input, .field select, .field textarea{
      padding:12px;border-radius:10px;border:none;background:#141414;color:var(--white);
      outline:none;border:1px solid rgba(255,255,255,0.1);
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    textarea{resize:none;height:110px;}

    .buttons{display:flex;justify-content:flex-end;gap:12px;margin-top:12px;}
    .buttons button{
      padding:12px 24px;border-radius:10px;border:none;cursor:pointer;transition:0.2s; font-weight: bold;
    }
    .cancel{background:rgba(255,255,255,0.1);color:var(--white);}
    .cancel:hover{background:rgba(255,255,255,0.2);}
    .create{background:linear-gradient(90deg,var(--accent),#ff8a3d);color:var(--white);}
    .create:hover{opacity:0.8;}
  </style>
</head>
<body>
  <div class="container">

    <aside>
      <div class="logo"><span class="mark">A+</span> Auto+Assis</div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="estoque.html">Estoque</a>
        <a href="movimentacao.html">Movimentações</a>
        <a href="servicos.html" class="active">Serviços</a>
        <a href="relatorio.html">Relatórios</a>
      </nav>
      <div class="user">
        <strong id="nomeGerente">Administrador</strong><br><small style="color:var(--muted)">Gerente</small>
      </div>
      <button onclick="fazerLogoff()">Sair</button>
    </aside>

    <main>
      <h1>Nova Ordem de Serviço</h1>
      <p>Preencha os dados para criar uma nova OS presencial direto no sistema.</p>

      <form class="form-box" id="osForm">

        <div class="row">
          <div class="field">
            <label>Número da OS *</label>
            <input id="osNumber" type="text" readonly style="background:#1a1a1a; color: var(--accent); font-weight: bold;">
          </div>

          <div class="field">
            <label for="status">Status Inicial</label>
            <select id="status">
              <option value="Aguardando Aprovação">Aguardando Aprovação (Orçamento)</option>
              <option value="Aprovado">Aprovado pelo Cliente</option>
              <option value="Em Andamento">Em Andamento (Na Oficina)</option>
              <option value="Concluído">Concluído</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="cliente">Cliente *</label>
            <input id="cliente" type="text" placeholder="Nome do cliente" required>
          </div>
          <div class="field">
            <label for="telefone">Telefone / WhatsApp *</label>
            <input id="telefone" type="text" placeholder="(00) 00000-0000" required>
          </div>
          <div class="field">
            <label for="emailCliente">Email do Cliente</label>
            <input id="emailCliente" type="email" placeholder="email@exemplo.com">
          </div>
        </div>

        <div class="row">
          <div class="field" style="flex: 2;">
            <label for="veiculo">Veículo (Marca/Modelo) *</label>
            <input id="veiculo" type="text" placeholder="Ex: Fiat Uno 1.0" required>
          </div>
          <div class="field">
            <label for="placa">Placa *</label>
            <input id="placa" type="text" placeholder="ABC-1234" required>
          </div>
          <div class="field">
            <label for="ano">Ano</label>
            <input id="ano" type="number" placeholder="2018">
          </div>
        </div>

        <div class="field">
          <label for="descricao">Descrição do Serviço / Problema *</label>
          <textarea id="descricao" placeholder="Descreva o serviço a ser realizado..." required></textarea>
        </div>

        <div class="row">
          <div class="field">
            <label for="responsavel">Mecânico Responsável</label>
            <input id="responsavel" type="text" placeholder="Nome do mecânico">
          </div>

          <div class="field">
            <label for="dataInicio">Data de Início</label>
            <input id="dataInicio" type="date">
          </div>

          <div class="field">
            <label for="custoTotal">Custo do Serviço (R$)</label>
            <input id="custoTotal" type="number" step="0.01" value="0.00">
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="cancel" onclick="window.location.href='servicos.html'">Cancelar</button>
          <button type="submit" class="create" id="submitBtn">Criar e Salvar OS</button>
        </div>

      </form>
    </main>

  </div>

  <script>
    // --- LÓGICA DE PERFIL (Alterado para a gaveta do Gerente) ---
    const nomeLogado = localStorage.getItem('nomeGerenteLogado') || 'Administrador';
    document.getElementById('nomeGerente').textContent = nomeLogado;
    document.getElementById('responsavel').value = nomeLogado;

    // Função de Sair (Limpa a gaveta do Gerente)
    function fazerLogoff() {
        localStorage.removeItem('nomeGerenteLogado');
        localStorage.removeItem('emailGerenteLogado');
        window.location.href = 'login.html';
    }

    // Seta a data de hoje por padrão
    const dataHoje = new Date().toISOString().split('T')[0];
    document.getElementById('dataInicio').value = dataHoje;

    // Gera um número de OS aleatório no padrão OS-1234
    const osRandom = Math.floor(1000 + Math.random() * 9000);
    const numOS = `OS-${osRandom}`;
    document.getElementById('osNumber').value = numOS;

    const form = document.getElementById('osForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.textContent = 'Salvando...';
      submitBtn.disabled = true;

      // Se não tiver email, coloca um genérico para o banco aceitar
      const email = document.getElementById('emailCliente').value || 'presencial@autoassis.com';
      const statusEscolhido = document.getElementById('status').value;
      const custo = document.getElementById('custoTotal').value;
      const dataCriacaoISO = new Date().toISOString();

      const dadosPrincipais = {
          nomeCliente: document.getElementById('cliente').value,
          emailCliente: email,
          telefone: document.getElementById('telefone').value,
          veiculo: document.getElementById('veiculo').value,
          ano: document.getElementById('ano').value,
          placa: document.getElementById('placa').value,
          problema: document.getElementById('descricao').value,
          urgencia: 'Média',
          status: statusEscolhido,
          dataCriacao: dataCriacaoISO
      };

      try {
          // 1. Salva a OS Básica no Banco
          await fetch('http://localhost:3000/api/solicitacoes', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(dadosPrincipais)
          });

          // 2. Busca a OS que acabou de ser criada para atrelar o Preço e o Número OS
          const resBusca = await fetch('http://localhost:3000/api/solicitacoes');
          const todos = await resBusca.json();
          
          // Encontra a OS recém-criada (a última do mesmo cliente)
          const osCriada = todos.reverse().find(s => s.nomeCliente === dadosPrincipais.nomeCliente);

          if (osCriada) {
              // 3. Salva o Dinheiro e o Número da OS
              await fetch(`http://localhost:3000/api/solicitacoes/${osCriada.id}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ 
                      status: statusEscolhido, 
                      custoSugerido: custo, 
                      osNumero: numOS 
                  })
              });
          }

          alert(`✅ Ordem de Serviço ${numOS} criada e salva no banco de dados!`);
          window.location.href = 'servicos.html';

      } catch (error) {
          console.error('Erro:', error);
          alert('Erro ao conectar com o banco de dados. O Node.js está rodando?');
          submitBtn.textContent = 'Criar e Salvar OS';
          submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
