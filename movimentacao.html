<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Movimentações — Auto+Assis</title>
    <style>
        :root{ --bg:#0a0a0a; --panel:#0f0f0f; --accent:#ff6a00; --white:#ffffff; --muted:#cccccc; --success:#22c55e; --danger:#ff4d4d; --radius:12px; font-family:Inter,sans-serif; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--white);display:flex;height:100vh;}
        aside{width:260px;background:var(--panel);padding:24px;display:flex;flex-direction:column;gap:18px; border-right: 1px solid #1a1a1a;}
        aside .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
        aside .logo .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;}
        aside nav{flex:1;display:flex;flex-direction:column;gap:12px;}
        aside nav a{display:block;padding:10px 14px;border-radius:10px;color:var(--white); text-decoration:none;}
        aside nav a.active, aside nav a:hover{background:rgba(255,106,0,0.2); color:var(--accent);}
        main{flex:1;padding:30px;overflow-y:auto;}
        
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header-top h1 { margin-bottom: 5px; }
        
        .btn-nova { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-nova:hover { opacity: 0.8; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--panel); padding: 20px; border-radius: var(--radius); border: 1px solid #1a1a1a; }
        .kpi-card h3 { color: var(--white); font-size: 1rem; margin-bottom: 10px; }
        .kpi-card .value { font-size: 2.2rem; font-weight: bold; margin-bottom: 5px; }

        .filter-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 16px; border: 1px solid #333; background: #111; color: var(--muted); border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .filter-btn:hover { background: #222; color: var(--white); }
        .filter-btn.active { background: var(--white); color: #000; border-color: var(--white); }
        .filter-btn.active-entrada { background: var(--success); color: white; border-color: var(--success); }
        .filter-btn.active-saida { background: var(--danger); color: white; border-color: var(--danger); }
        
        .list-item { background: #111; padding: 15px 20px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
    

/* Toast profissional */
#toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #111;
    color: #fff;
    border-left: 5px solid #ff6a00;
    padding: 14px 18px;
    border-radius: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: .3s ease;
    z-index: 9999;
    pointer-events: none;
    min-width: 260px;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,.45);
    font-size: 14px;
}

#toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>
<body>
    <aside>
        <div class="logo"><span class="mark">A+</span> Auto+Assis</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="estoque.html">Estoque</a>
            <a href="movimentacao.html" class="active">Movimentações</a>
            <a href="servicos.html">Serviços</a>
            <a href="relatorio.html">Relatórios</a>
        </nav>
        <div style="margin-top:auto; background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center;">
            <strong id="nomeGerente">Administrador</strong><br>
            <small style="color:var(--muted)">Gerente</small>
        </div>
        <button onclick="fazerLogoff()" style="margin-top:10px; padding:10px; border:none; border-radius:10px; background:rgba(255,77,77,0.2); color:var(--danger); cursor:pointer;">Sair</button>
    </aside>

    <main>
        <div class="header-top">
            <div>
                <h1>Movimentações de Estoque</h1>
                <p style="color:var(--muted);">Visualize o histórico de entradas e saídas de peças</p>
            </div>
            <button class="btn-nova" onclick="window.location.href='novamovimentacao.html'">+ Nova Movimentação</button>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3 style="color: var(--white);">↔ Total</h3>
                <div class="value" id="valTotal">0</div>
            </div>
            <div class="kpi-card">
                <h3 style="color: var(--success);">↑ Entradas</h3>
                <div class="value" id="valEntradas" style="color: var(--success);">0</div>
            </div>
            <div class="kpi-card">
                <h3 style="color: var(--danger);">↓ Saídas</h3>
                <div class="value" id="valSaidas" style="color: var(--danger);">0</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h3>Histórico Recente</h3>
            
            <div class="filter-group">
                <button class="filter-btn active" id="btnTodos" onclick="filtrarLista('todos')">Todos</button>
                <button class="filter-btn" id="btnEntradas" onclick="filtrarLista('entrada')">↑ Entradas</button>
                <button class="filter-btn" id="btnSaidas" onclick="filtrarLista('saida')">↓ Saídas</button>
            </div>
        </div>

        <div id="listaMov">
            <p style="color: var(--muted);">Carregando movimentações...</p>
        </div>
    </main>

    <script>
        const nomeGerente = localStorage.getItem('nomeGerenteLogado') || 'Administrador';
        document.getElementById('nomeGerente').textContent = nomeGerente;

        function fazerLogoff() {
            localStorage.removeItem('nomeGerenteLogado');
            localStorage.removeItem('emailGerenteLogado');
            window.location.href = 'login.html';
        }

        let todasAsMovimentacoes = [];

        async function carregarMovimentacoes() {
            try {
                const res = await fetch('http://localhost:3000/api/movimentacoes');
                todasAsMovimentacoes = await res.json();

todasAsMovimentacoes.sort((a, b) => {
    const dataA = new Date(a.data);
    const dataB = new Date(b.data);

    if (dataB - dataA !== 0) {
        return dataB - dataA;
    }

    return Number(b.id || 0) - Number(a.id || 0);
});

renderizarLista('todos');
                
            } catch (e) {
                console.error("Erro:", e);
                document.getElementById('listaMov').innerHTML = '<p style="color:red;">Erro ao conectar com o servidor Node.js.</p>';
            }
        }

        function renderizarLista(filtroSelecionado) {
            const container = document.getElementById('listaMov');
            container.innerHTML = '';
            
            let totalMovs = todasAsMovimentacoes.length;
            let qtdEntradas = 0;
            let qtdSaidas = 0;

            todasAsMovimentacoes.forEach(m => {
                const isEntrada = m.tipo ? m.tipo.toLowerCase().includes('entrada') : false;
                if (isEntrada) qtdEntradas++;
                else qtdSaidas++;
            });
            
            document.getElementById('valTotal').textContent = totalMovs;
            document.getElementById('valEntradas').textContent = qtdEntradas;
            document.getElementById('valSaidas').textContent = qtdSaidas;

            let movsFiltradas = todasAsMovimentacoes;
            
            if (filtroSelecionado === 'entrada') {
                movsFiltradas = todasAsMovimentacoes.filter(m => m.tipo && m.tipo.toLowerCase().includes('entrada'));
            } else if (filtroSelecionado === 'saida') {
                movsFiltradas = todasAsMovimentacoes.filter(m => !m.tipo || !m.tipo.toLowerCase().includes('entrada'));
            }

            if (movsFiltradas.length === 0) {
                container.innerHTML = '<p style="color: var(--muted); text-align:center; padding: 20px;">Nenhuma movimentação encontrada.</p>';
                return;
            }

            movsFiltradas.forEach(m => {
                const tipoStr = m.tipo ? m.tipo.toLowerCase() : '';
                const isEntrada = tipoStr.includes('entrada');
                
                const cor = isEntrada ? 'var(--success)' : 'var(--danger)';
                const icone = isEntrada ? '↑' : '↓';
                const sinal = isEntrada ? '+' : '-';
                const tipoTexto = isEntrada ? 'ENTRADA' : 'SAÍDA';
                
                // MÁGICA DO FUSO HORÁRIO AQUI: Fatiando a string diretamente
                let dataFormatada = 'Data inválida';
                if (m.data) {
                    const apenasData = m.data.split('T')[0]; // Pega só o "2026-03-26"
                    const partes = apenasData.split('-');
                    if (partes.length === 3) {
                        dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`; // Inverte para DD/MM/YYYY
                    }
                }
                
                const obs = m.obs ? m.obs : 'Sem observações';
                
                container.innerHTML += `
                    <div class="list-item" style="border-left: 4px solid ${cor}">
                        <div>
                            <div style="color: ${cor}; font-weight: bold; margin-bottom: 5px;">${icone} ${tipoTexto} <span style="color: var(--white); font-weight: normal;">- Peça: ${m.nome_peca}</span></div>
                            <div style="color: var(--muted); font-size: 0.85em;">${dataFormatada} - ${obs}</div>
                        </div>
                        <div style="font-weight: bold; font-size: 1.1em; color: var(--white);">
                            ${sinal}${m.quantidade} un.
                        </div>
                    </div>
                `;
            });
        }

        function filtrarLista(tipo) {
            document.getElementById('btnTodos').className = 'filter-btn';
            document.getElementById('btnEntradas').className = 'filter-btn';
            document.getElementById('btnSaidas').className = 'filter-btn';

            if (tipo === 'todos') {
                document.getElementById('btnTodos').className = 'filter-btn active';
            } else if (tipo === 'entrada') {
                document.getElementById('btnEntradas').className = 'filter-btn active-entrada';
            } else if (tipo === 'saida') {
                document.getElementById('btnSaidas').className = 'filter-btn active-saida';
            }

            renderizarLista(tipo);
        }

        carregarMovimentacoes();
    </script>

  <div id="toast"></div>
<script>

function mostrarToast(texto) {
    let toast = document.getElementById('toast');

    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        document.body.appendChild(toast);
    }

    toast.textContent = texto;
    toast.classList.add('show');

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

</script>
</body>
</html>
