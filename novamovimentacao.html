<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nova Movimentação — Auto+Assis</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --panel:#0f0f0f;
      --accent:#ff6a00;
      --white:#ffffff;
      --muted:#cccccc;
      --success:#22c55e;
      --danger:#ff4d4d;
      --radius:12px;
      --shadow:0 8px 30px rgba(0,0,0,0.6);
      font-family:Inter,system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--white);}
    a{text-decoration:none;color:var(--accent);}
    a:hover{text-decoration:underline;}
    .container{display:flex;height:100vh;}
    aside{width:260px;background:var(--panel);padding:24px;display:flex;flex-direction:column;gap:18px;}
    aside .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
    aside .logo .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;}
    aside nav{flex:1;display:flex;flex-direction:column;gap:12px;}
    aside nav a{display:block;padding:10px 14px;border-radius:10px;color:var(--white);}
    aside nav a.active,aside nav a:hover{background:rgba(255,106,0,0.2);}
    aside .user{margin-top:auto;padding:12px;border-radius:10px;background:rgba(255,255,255,0.05);text-align:center;}
    aside button{margin-top:12px;padding:10px;border:none;border-radius:10px;background:rgba(255,77,77,0.2);color:var(--danger);cursor:pointer;transition:background 0.2s;}
    aside button:hover{background:rgba(255,77,77,0.4);}
    main{flex:1;padding:24px;overflow-y:auto;}
    main h1{font-size:24px;margin-bottom:4px;}
    main p{color:var(--muted);margin-bottom:18px;}
    form{background:var(--panel);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;max-width:900px;}
    label{font-weight:600;margin-bottom:4px;}
    .row{display:flex;gap:16px;}
    select,input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--white);}
    textarea{resize:vertical;min-height:100px;}
    .tipo-buttons{display:flex;gap:12px;}
    .tipo-btn{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;justify-content:center;align-items:center;font-weight:600;transition:all .2s;}
    .tipo-btn.active.entrada{background:rgba(34,197,94,0.2);color:var(--success);}
    .tipo-btn.active.saida{background:rgba(255,77,77,0.2);color:var(--danger);}
    .buttons{display:flex;justify-content:flex-end;gap:12px;}
    .cancelar{padding:10px 16px;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:var(--white);cursor:pointer;}
    .registrar{padding:10px 16px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent),#ff8a3d);color:var(--white);cursor:pointer;}
    .cancelar:hover{background:rgba(255,255,255,0.2);}
    .registrar:hover{opacity:.8;}
	
	option {
      background-color: #141414;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside>
      <div class="logo"><span class="mark">A+</span> Auto+Assis</div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="estoque.html">Estoque</a>
        <a href="movimentacao.html" class="active">Movimentações</a>
        <a href="servicos.html">Serviços</a>
        <a href="relatorio.html">Relatórios</a>
      </nav>
      
      <div class="user">
        <strong id="nomeGerentePerfil">Administrador</strong><br>
        <small style="color:var(--muted)">Gerente</small>
      </div>
      <button id="sairBtn" onclick="fazerLogoff()">Sair</button>
    </aside>

    <main>
      <h1>Movimentações de Estoque</h1>
      <p>Registre entradas e saídas de peças</p>

      <form id="movForm">
        <h2>Nova Movimentação</h2>

        <div>
          <label>Tipo de Movimentação</label>
          <div class="tipo-buttons">
            <div class="tipo-btn entrada active" data-tipo="entrada">↑ Entrada</div>
            <div class="tipo-btn saida" data-tipo="saida">↓ Saída</div>
          </div>
        </div>

        <div class="row">
          <div style="flex:2;">
            <label>Peça *</label>
            <select id="pecaSelect" required>
              <option value="">Selecione uma peça</option>
            </select>
          </div>
          <div style="flex:1;">
            <label>Quantidade *</label>
            <input type="number" id="quantidade" value="1" min="1" required>
          </div>
        </div>

        <div>
          <label>Observações</label>
          <textarea id="obs" placeholder="Detalhes adicionais..."></textarea>
        </div>

        <div class="buttons">
          <button type="button" class="cancelar" id="cancelarBtn">Cancelar</button>
          <button type="submit" class="registrar">Registrar Movimentação</button>
        </div>
      </form>
    </main>
  </div>

<script>
    // --- LÓGICA DE PERFIL (Gaveta do Gerente) ---
    const nomeLogado = localStorage.getItem('nomeGerenteLogado') || 'Administrador';
    document.getElementById('nomeGerentePerfil').textContent = nomeLogado;

    function fazerLogoff() {
        localStorage.removeItem('nomeGerenteLogado');
        localStorage.removeItem('emailGerenteLogado');
        window.location.href = 'login.html';
    }

    let tipoSelecionado = "entrada";

    // 1. Alternar entre Entrada e Saída (Visual)
    document.querySelectorAll(".tipo-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tipo-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        tipoSelecionado = btn.dataset.tipo;
      });
    });

    // 2. BUSCAR PEÇAS DO BANCO DE DADOS (MYSQL via NODE.JS)
    async function popularPecaSelect() {
        const select = document.getElementById('pecaSelect');
        
        try {
            // Chamada para o seu servidor Node.js
            const resposta = await fetch('http://localhost:3000/api/pecas');
            if (!resposta.ok) throw new Error('Erro ao buscar dados do servidor');
            
            const pecas = await resposta.json();
            
            select.innerHTML = '<option value="" disabled selected>Selecione uma peça</option>';
            
            if (pecas.length === 0) {
                select.innerHTML = '<option value="" disabled selected>Nenhuma peça no estoque!</option>';
                return;
            }

            pecas.forEach(peca => {
                const option = document.createElement('option');
                // IMPORTANTE: usamos 'id' (que é PEC-001) como valor
                option.value = peca.id; 
                option.textContent = `${peca.nome} (${peca.id}) - Qtd: ${peca.quantidade}`;
                select.appendChild(option);
            });
            
            console.log("✅ Peças carregadas do banco de dados!");
        } catch (erro) {
            console.error("❌ Erro:", erro);
            select.innerHTML = '<option value="" disabled>Erro ao carregar banco de dados</option>';
        }
    }

    // Chamada inicial ao carregar a página
    popularPecaSelect();

    // 3. REGISTRAR MOVIMENTAÇÃO NO BANCO DE DADOS
    document.getElementById("movForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const pecaId = document.getElementById("pecaSelect").value;
      const quantidade = parseInt(document.getElementById("quantidade").value, 10);
      const obs = document.getElementById("obs").value.trim();
      const dataHoje = new Date().toISOString().split('T')[0]; // Formato YYYY-MM-DD

      if (!pecaId) {
        alert("Por favor, selecione uma peça.");
        return;
      }

      const btnSubmit = e.target.querySelector('button[type="submit"]');
      btnSubmit.disabled = true;
      btnSubmit.textContent = "Registrando...";

      try {
        // Envia a movimentação para o seu servidor Node.js
        const resposta = await fetch('http://localhost:3000/api/movimentacoes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                tipo: tipoSelecionado,
                pecaId: pecaId,
                quantidade: quantidade,
                data: dataHoje,
                obs: obs
            })
        });

        if (resposta.ok) {
            alert(`Sucesso! Movimentação de ${tipoSelecionado} registrada.`);
            window.location.href = "movimentacao.html";
        } else {
            alert("Erro ao registrar no banco de dados.");
        }
      } catch (erro) {
        console.error("Erro na submissão:", erro);
        alert("Servidor fora do ar!");
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Registrar Movimentação";
      }
    });

    // Botão Cancelar
    document.getElementById("cancelarBtn").addEventListener("click", () => {
      window.location.href = "movimentacao.html";
    });
</script>
</body>
</html>
