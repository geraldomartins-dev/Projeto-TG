<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Criar Nova Senha — Auto+Assis</title>
  <style>
    :root{
      --bg:#0a0a0a; --accent:#ff6a00; --white:#ffffff; --muted:#cccccc;
      --success:#22c55e; --danger:#ff4d4d; --radius:14px;
      --shadow:0 8px 30px rgba(0,0,0,0.6); font-family:Inter,system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--white);display:flex;align-items:center;justify-content:center;padding:32px;}
    .card{width:100%;max-width:920px;display:grid;grid-template-columns:1fr 420px;gap:28px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .panel{padding:36px;background:linear-gradient(135deg,rgba(255,106,0,0.07) 0%,transparent 50%),radial-gradient(800px 400px at 10% 10%,rgba(255,106,0,0.06),transparent 20%);display:flex;flex-direction:column;justify-content:center;gap:18px;}
    .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
    .logo .mark{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;font-size:18px;box-shadow:0 10px 30px rgba(255,106,0,0.12) inset;}
    .logo h1{margin:0;font-size:20px;color:var(--white)}
    .logo p{margin:0;color:var(--muted);font-size:13px}
    .promo{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.4;}
    .form-wrap{padding:36px 40px;background:linear-gradient(180deg,rgba(10,10,10,0.8),rgba(15,15,15,0.9));display:flex;flex-direction:column;justify-content:center;gap:18px;}
    h2{margin:0 0 6px 0;font-size:20px}
    p.lead{margin:0;color:var(--muted);font-size:13px}
    form{display:flex;flex-direction:column;gap:12px;margin-top:8px}
    label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
    input[type=password]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white);font-size:15px;outline:none;transition:box-shadow .18s,border-color .18s;}
    input:focus{border-color:rgba(255,106,0,0.9);box-shadow:0 6px 18px rgba(255,106,0,0.08);}
    button[type=submit]{margin-top:8px;padding:12px 14px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent),#ff8a3d);color:var(--white);font-weight:600;cursor:pointer;font-size:15px;box-shadow:0 8px 18px rgba(255,106,0,0.14);}
    button[type=submit]:active{transform:translateY(1px)}
    .status{font-size:13px;padding:10px;border-radius:10px}
    .error{background:rgba(255,77,77,0.08);color:var(--danger);border:1px solid rgba(255,77,77,0.1)}
    .ok{background:rgba(34,197,94,0.07);color:var(--success);border:1px solid rgba(34,197,94,0.08)}
    footer{padding:14px 18px;text-align:center;color:var(--muted);font-size:13px}
    @media(max-width:880px){.card{grid-template-columns:1fr;}.panel{order:2;padding:22px}.form-wrap{order:1;padding:28px}}
  </style>
</head>
<body>
  <main class="card">
    <section class="panel">
      <div class="logo">
        <span class="mark">A+</span>
        <div>
          <h1>Auto+Assis</h1>
          <p>Oficina & Serviços</p>
        </div>
      </div>
      <p class="promo">Acesso de segurança confirmado! Crie uma nova senha forte para acessar sua conta.</p>
    </section>

    <section class="form-wrap">
      <div>
        <h2>Criar Nova Senha</h2>
        <p class="lead">Digite sua nova credencial de acesso.</p>
      </div>

      <form id="resetForm" novalidate>
        <div>
          <label for="password">Nova Senha</label>
          <input id="password" type="password" placeholder="••••••••" minlength="6" required>
        </div>
        <div>
          <label for="confirm">Confirmar Nova Senha</label>
          <input id="confirm" type="password" placeholder="••••••••" minlength="6" required>
        </div>

        <div id="status" class="status" style="display:none"></div>

        <button type="submit" id="submitBtn">Redefinir Senha</button>
      </form>

      <footer>&copy; <span id="year"></span> Auto+Assis — Todos os direitos reservados</footer>
    </section>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const form = document.getElementById('resetForm');
    const pwdEl = document.getElementById('password');
    const confirmEl = document.getElementById('confirm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    // Captura o token da URL que veio do e-mail
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showStatus('Erro de segurança: Token inválido ou ausente.', 'error');
        submitBtn.disabled = true;
    }

    function showStatus(msg, type) {
      statusEl.style.display = 'block';
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (type === 'error' ? 'error' : 'ok');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const pwd = pwdEl.value;
      const confirm = confirmEl.value;

      if (pwd.length < 6) { showStatus('A senha deve ter pelo menos 6 caracteres.', 'error'); return; }
      if (pwd !== confirm) { showStatus('As senhas não conferem.', 'error'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Salvando...';

      try {
          const resposta = await fetch('http://localhost:3000/api/resetar-senha', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: token, novaSenha: pwd })
          });
          
          const dados = await resposta.json();

          if (resposta.ok) {
              showStatus('✅ Senha redefinida com sucesso! Redirecionando para o login...', 'ok');
              setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          } else {
              showStatus(dados.erro || 'Erro ao redefinir a senha.', 'error');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Redefinir Senha';
          }
      } catch (erro) {
          showStatus('Erro de conexão com o servidor.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Redefinir Senha';
      }
    });
  </script>
</body>
</html>
