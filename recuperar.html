<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recuperar Senha — Auto+Assis</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --accent:#ff6a00;
      --white:#ffffff;
      --muted:#cccccc;
      --success:#22c55e;
      --danger:#ff4d4d;
      --radius:14px;
      --shadow:0 8px 30px rgba(0,0,0,0.6);
      font-family:Inter,system-ui,sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--white);display:flex;align-items:center;justify-content:center;padding:32px;}
    .card{width:100%;max-width:920px;display:grid;grid-template-columns:1fr 420px;gap:28px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .panel{padding:36px;background:linear-gradient(135deg,rgba(255,106,0,0.07) 0%,transparent 50%),radial-gradient(800px 400px at 10% 10%,rgba(255,106,0,0.06),transparent 20%);display:flex;flex-direction:column;justify-content:center;gap:18px;}
    .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
    .logo .mark{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;font-size:18px;box-shadow:0 10px 30px rgba(255,106,0,0.12) inset;}
    .logo h1{margin:0;font-size:20px;color:var(--white)}
    .logo p{margin:0;color:var(--muted);font-size:13px}
    .promo{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.4;}
    .form-wrap{padding:36px 40px;background:linear-gradient(180deg,rgba(10,10,10,0.8),rgba(15,15,15,0.9));display:flex;flex-direction:column;justify-content:center;gap:18px;}
    h2{margin:0 0 6px 0;font-size:20px}
    p.lead{margin:0;color:var(--muted);font-size:13px}
    form{display:flex;flex-direction:column;gap:12px;margin-top:8px}
    label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
    input[type=email]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white);font-size:15px;outline:none;transition:box-shadow .18s,border-color .18s;}
    input:focus{border-color:rgba(255,106,0,0.9);box-shadow:0 6px 18px rgba(255,106,0,0.08);}
    button[type=submit]{margin-top:8px;padding:12px 14px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent),#ff8a3d);color:var(--white);font-weight:600;cursor:pointer;font-size:15px;box-shadow:0 8px 18px rgba(255,106,0,0.14);}
    button[type=submit]:active{transform:translateY(1px)}
    .links{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:6px}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .status{font-size:13px;padding:10px;border-radius:10px}
    .error{background:rgba(255,77,77,0.08);color:var(--danger);border:1px solid rgba(255,77,77,0.1)}
    .ok{background:rgba(34,197,94,0.07);color:var(--success);border:1px solid rgba(34,197,94,0.08)}
    footer{padding:14px 18px;text-align:center;color:var(--muted);font-size:13px}
    @media(max-width:880px){.card{grid-template-columns:1fr;}.panel{order:2;padding:22px}.form-wrap{order:1;padding:28px}}
  </style>
</head>
<body>
  <main class="card">
    <section class="panel">
      <div class="logo">
        <span class="mark">A+</span>
        <div>
          <h1>Auto+Assis</h1>
          <p>Oficina & Serviços</p>
        </div>
      </div>
      <p class="promo">Esqueceu sua senha? Não se preocupe — vamos te ajudar a recuperar o acesso à sua conta.</p>
    </section>

    <section class="form-wrap">
      <div>
        <h2>Recuperar senha</h2>
        <p class="lead">Digite seu e-mail para enviarmos o link de redefinição.</p>
      </div>

      <form id="recoverForm" novalidate>
        <div>
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>
        </div>

        <div id="status" class="status" style="display:none"></div>

        <button type="submit" id="submitBtn">Enviar link</button>

        <div class="links">
          <span><a href="login.html">Voltar ao login</a></span>
          <span><a href="cadastro.html">Criar nova conta</a></span>
        </div>
      </form>

      <footer>&copy; <span id="year"></span> Auto+Assis — Todos os direitos reservados</footer>
    </section>
  </main>

  <script>
    const form = document.getElementById('recoverForm');
    const emailEl = document.getElementById('email');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    document.getElementById('year').textContent = new Date().getFullYear();

    function showStatus(msg, type) {
      statusEl.style.display = 'block';
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (type === 'error' ? 'error' : 'ok');
    }

    function clearStatus() {
      statusEl.style.display = 'none';
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();
      const email = emailEl.value.trim();

      if (!email) { showStatus('Informe seu e-mail.', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showStatus('E-mail inválido.', 'error'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando e-mail...';

      const btnAntigo = document.getElementById('magicBtn');
      if (btnAntigo) btnAntigo.style.display = 'none';

      try {
          const resposta = await fetch('http://localhost:3000/api/recuperar-senha', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: email })
          });
          
          const dados = await resposta.json();

          if (resposta.ok) {
              showStatus('✅ Sucesso! O link de recuperação foi enviado para a sua caixa de entrada.', 'ok');
              submitBtn.textContent = 'E-mail Enviado!';
              // (Apagamos todo o código do magicBtn daqui)
          } else {
              showStatus(dados.erro || 'Erro ao processar solicitação.', 'error');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Enviar link';
          }
      } catch (erro) {
          showStatus('Erro ao enviar o e-mail. Servidor fora do ar.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Tentar Novamente';
      }
    });

    emailEl.addEventListener('input', () => { if (statusEl.style.display === 'block') clearStatus(); });
  </script>
</html>
