<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Serviços — Auto+Assis</title>
    <style>
        :root{ --bg:#0a0a0a; --panel:#0f0f0f; --accent:#ff6a00; --white:#ffffff; --muted:#cccccc; --success:#22c55e; --danger:#ff4d4d; --radius:12px; font-family:Inter,sans-serif; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--white);display:flex;height:100vh;}
        aside{width:260px;background:var(--panel);padding:24px;display:flex;flex-direction:column;gap:18px; border-right: 1px solid #1a1a1a;}
        aside .logo{display:flex;align-items:center;gap:12px;font-weight:700;}
        aside .logo .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#ffa257);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:800;}
        aside nav{flex:1;display:flex;flex-direction:column;gap:12px;}
        aside nav a{display:block;padding:10px 14px;border-radius:10px;color:var(--white); text-decoration:none;}
        aside nav a.active, aside nav a:hover{background:rgba(255,106,0,0.2); color:var(--accent);}
        main{flex:1;padding:30px;overflow-y:auto;}
        
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header-top h1 { margin-bottom: 5px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-top { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-atualizar { background: #333; }
        .btn-atualizar:hover { background: #444; }
        .btn-nova-os { background: var(--success); }
        .btn-nova-os:hover { opacity: 0.8; }

        .card-servico { background: var(--panel); padding: 20px; border-radius: var(--radius); margin-bottom: 15px; border-left: 5px solid #333; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a;}
        .card-servico h3 { color: var(--accent); margin-bottom: 5px; }
        .card-servico p { color: var(--muted); font-size: 0.9em; margin-bottom: 5px; }
        .btn-gerenciar { background: #333; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-decoration: none; display: inline-block;}
        .btn-gerenciar:hover { background: var(--accent); }
        .btn-ocultar { background: #444; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-left: 10px; }
        .btn-ocultar:hover { background: #222; }
        
        /* Cores de Status */
        .border-pendente { border-left-color: #ff6a00; }
        .border-analise { border-left-color: #1e88e5; }
        .border-aprovado { border-left-color: #22c55e; }
        .border-andamento { border-left-color: #f59e0b; }
        .border-concluido { border-left-color: #888; opacity: 0.7; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>
    <aside>
        <div class="logo"><span class="mark">A+</span> Auto+Assis</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="estoque.html">Estoque</a>
            <a href="movimentacao.html">Movimentações</a>
            <a href="servicos.html" class="active">Serviços</a>
            <a href="relatorio.html">Relatórios</a>
        </nav>
        
        <div style="margin-top:auto; background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center;">
            <strong id="nomeGerentePerfil">Administrador</strong><br>
            <small style="color:var(--muted)">Gerente</small>
        </div>
        
        <button onclick="window.location.href='login.html'" style="margin-top:10px; padding:10px; border:none; border-radius:10px; background:rgba(255,77,77,0.2); color:var(--danger); cursor:pointer;">Sair</button>
    </aside>

    <main>
        <div class="header-top">
            <div>
                <h1>Painel de Serviços</h1>
                <p style="color:var(--muted);">Faça a gestão das solicitações e ordens de serviço da oficina.</p>
            </div>
            <div class="btn-group">
                <button class="btn-top btn-atualizar" onclick="carregarServicos()">🔄 Atualizar Lista</button>
                <button class="btn-top btn-nova-os" onclick="window.location.href='novaos.html'">+ Nova OS Presencial</button>
            </div>
        </div>

        <div id="listaServicos">
            <p>A carregar serviços da base de dados...</p>
        </div>
    </main>

    <script>
        // Lógica de perfil atualizada para a gaveta do Gerente
        const nomeLogado = localStorage.getItem('nomeGerenteLogado') || 'Administrador';
        document.getElementById('nomeGerentePerfil').textContent = nomeLogado;

        async function carregarServicos() {
            const container = document.getElementById('listaServicos');
            try {
                const res = await fetch('http://localhost:3000/api/solicitacoes');
                const dados = await res.json();
                
                const ocultos = JSON.parse(localStorage.getItem('ocultosGerente')) || [];
                const dadosVisiveis = dados.filter(s => !ocultos.includes(s.id.toString()));
                
                container.innerHTML = '';

                dadosVisiveis.sort((a, b) => {
                    if (a.status === 'Concluído') return 1;
                    if (b.status === 'Concluído') return -1;
                    return 0;
                });

                if (dadosVisiveis.length === 0) {
                    container.innerHTML = '<p style="color:var(--muted)">Nenhum serviço pendente ou ativo na sua lista.</p>';
                    return;
                }

                dadosVisiveis.forEach(s => {
                    let classeBorda = 'border-pendente';
                    if (s.status === 'Em Análise' || s.status === 'Aguardando Aprovação') classeBorda = 'border-analise';
                    if (s.status === 'Aprovado') classeBorda = 'border-aprovado';
                    if (s.status === 'Em Andamento') classeBorda = 'border-andamento';
                    if (s.status === 'Concluído' || s.status === 'Rejeitado') classeBorda = 'border-concluido';

                    // Cores da Urgência
                    let corUrgencia = '#333'; // Padrão
                    if (s.urgencia === 'Alta' || s.urgencia === 'Urgente') corUrgencia = 'var(--danger)';
                    else if (s.urgencia === 'Média') corUrgencia = '#f59e0b';
                    else if (s.urgencia === 'Baixa') corUrgencia = '#1e88e5';

                    // Etiqueta de Urgência
                    let badgeUrgencia = s.urgencia ? `<span class="status-badge" style="background:${corUrgencia}; margin-left:10px;">🚨 Urgência: ${s.urgencia}</span>` : '';

                    let botoesAcao = `<a href="gerenciar_solicitacao.html?id=${s.id}" class="btn-gerenciar">Gerenciar</a>`;
                    
                    if (s.status === 'Concluído' || s.status === 'Rejeitado') {
                        botoesAcao += `<button onclick="ocultarServico(${s.id})" class="btn-ocultar">DELETAR</button>`;
                    }

                    const card = document.createElement('div');
                    card.className = `card-servico ${classeBorda}`;
                    
                    card.innerHTML = `
                        <div>
                            <h3>${s.veiculo} (Placa: ${s.placa})</h3>
                            <p><strong>Cliente:</strong> ${s.nomeCliente} | <strong>Protocolo:</strong> SOL-${s.id}</p>
                            <p><strong>Problema:</strong> ${s.problema}</p>
                            <div style="margin-top: 10px;">
                                <span class="status-badge">${s.status}</span>
                                ${s.osNumero ? `<span class="status-badge" style="background:var(--accent); margin-left:10px;">${s.osNumero}</span>` : ''}
                                ${badgeUrgencia}
                            </div>
                        </div>
                        <div>
                            ${botoesAcao}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (erro) {
                container.innerHTML = '<p style="color:red;">Erro ao ligar ao servidor Node.js.</p>';
            }
        }

        function ocultarServico(id) {
            if(!confirm("Deseja deletar este serviço da sua tela?\n(Ele continuará no histórico do cliente e no Faturamento)")) return;
            const ocultos = JSON.parse(localStorage.getItem('ocultosGerente')) || [];
            ocultos.push(id.toString());
            localStorage.setItem('ocultosGerente', JSON.stringify(ocultos));
            carregarServicos(); 
        }

        carregarServicos();
    </script>
</body>
</html>
